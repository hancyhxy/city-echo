<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Echo — Storyboard 1 · UTS Library</title>
  <style>
    :root {
      --bg-page:        #e8ddd3;
      --bg-paper:       #fdfaf5;
      --text-primary:   #2c2c2c;
      --text-secondary: #6b6b6b;
      --text-muted:     #999999;
      --accent-amber:   #d48a2d;
      --border-subtle:  #e0d8d0;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --shadow-soft: 0 2px 8px rgba(44, 44, 44, 0.04);
      --shadow-card: 0 4px 16px rgba(44, 44, 44, 0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      background: #ffffff;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      padding: 56px 72px;
    }

    .sb-sheet {
      max-width: 2000px;
      margin: 0 auto;
      background: transparent;
      padding: 0;
    }

    .sb-header {
      margin-bottom: 40px;
    }

    .sb-header h1 {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .sb-eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .sb-subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .sb-subtitle .accent {
      color: var(--accent-amber);
      font-weight: 500;
    }

    .sb-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px 28px;
    }

    .sb-frame {
      display: flex;
      flex-direction: column;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .sb-frame img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #fff;
    }

    .sb-frame figcaption {
      margin-top: 16px;
    }

    .sb-frame h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.005em;
    }

    .sb-frame p {
      font-size: 13.5px;
      line-height: 1.55;
      color: var(--text-secondary);
    }

    @media print {
      body { background: #fff; padding: 24px; }
      .sb-sheet { box-shadow: none; border: none; padding: 0; }
    }

    @media (max-width: 1100px) {
      .sb-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <div class="sb-sheet">

    <header class="sb-header">
      <p class="sb-eyebrow">City Echo · Scenario 1</p>
      <h1>Storyboard</h1>
      <p class="sb-subtitle">
        UTS Library — <span class="accent">"The Study Companion"</span> · Mei Chen
      </p>
    </header>

    <section class="sb-grid">

      <figure class="sb-frame">
        <img src="Frame 1 - Same loop again.png" alt="Scene 1: Mei enters UTS Library, phone in hand, skipping through her on-repeat playlist.">
        <figcaption>
          <h3>Scene 1: Same loop, again</h3>
          <p>Another study session, another loop through the same five songs. The algorithm has run out of ideas.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Frame 2 - The Library has a soundscape.png" alt="Scene 2: Mei at her desk as a gentle amber prompt lights up her phone screen.">
        <figcaption>
          <h3>Scene 2: The Library has a soundscape</h3>
          <p>Every place holds its own quiet listening. The library's soundscape has been shaped by the people already here.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Frame 3 - Filtering by mood and language.png" alt="Scene 3: Over-the-shoulder view of Mei tapping amber filter chips for focus and Mandarin.">
        <figcaption>
          <h3>Scene 3: Filtering by mood and language</h3>
          <p>She didn't pick a genre — she picked a feeling and a language. The library offered the rest.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Frame 4 - Someone was here before.png" alt="Scene 4: Close-up of phone screen with an anonymous red-panda story card attached to the song.">
        <figcaption>
          <h3>Scene 4: Someone was here before</h3>
          <p>A stranger has been in her chair before her, left a sentence, and moved on. No name, no message — just a fingerprint attached to a song.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Frame 5 - Settling in.png" alt="Scene 5: Side profile of Mei typing at her laptop, phone propped on a stack of books.">
        <figcaption>
          <h3>Scene 5: Settling in</h3>
          <p>She is not alone in this track. Somewhere in this building, twelve others are inside the same three minutes of music.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Frame 6 - End of the song.png" alt="Scene 6: Mei's hands composing a short post on her phone after the track ends.">
        <figcaption>
          <h3>Scene 6: End of the song — leave a trace?</h3>
          <p>The app never demanded she say anything. But a song she actually liked earned one sentence back — her first contribution to this place.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Frame 7 - Save to playlist.jpg" alt="Scene 7: Top-down macro of the phone saving a track into the UTS Library · Focus playlist.">
        <figcaption>
          <h3>Scene 7: Save to Library playlist</h3>
          <p>The discovery doesn't vanish with the session. Her library study-self now has its own quiet catalogue, built from strangers' recommendations.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Frame 8 - Belonging.png" alt="Scene 8: Wide hero shot of Mei packing up at golden hour among a constellation of desk-lamp glows.">
        <figcaption>
          <h3>Scene 8: She belongs to this room now</h3>
          <p>She never spoke to anyone. She is leaving with a new playlist, a contribution, and the quiet certainty that this room has been inhabited with her.</p>
        </figcaption>
      </figure>

    </section>

  </div>

</body>
</html>
