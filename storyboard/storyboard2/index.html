<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Echo — Storyboard 2 · Burwood → Wynyard Commute</title>
  <style>
    :root {
      --bg-page:        #e8ddd3;
      --bg-paper:       #fdfaf5;
      --text-primary:   #2c2c2c;
      --text-secondary: #6b6b6b;
      --text-muted:     #999999;
      --accent-amber:   #d48a2d;
      --border-subtle:  #e0d8d0;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --shadow-soft: 0 2px 8px rgba(44, 44, 44, 0.04);
      --shadow-card: 0 4px 16px rgba(44, 44, 44, 0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      background: #ffffff;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      padding: 56px 72px;
    }

    .sb-sheet {
      max-width: 2000px;
      margin: 0 auto;
      background: transparent;
      padding: 0;
    }

    .sb-header {
      margin-bottom: 40px;
    }

    .sb-header h1 {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .sb-eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .sb-subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .sb-subtitle .accent {
      color: var(--accent-amber);
      font-weight: 500;
    }

    .sb-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px 28px;
    }

    .sb-frame {
      display: flex;
      flex-direction: column;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .sb-frame img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #fff;
    }

    .sb-frame figcaption {
      margin-top: 16px;
    }

    .sb-frame h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.005em;
    }

    .sb-frame p {
      font-size: 13.5px;
      line-height: 1.55;
      color: var(--text-secondary);
    }

    @media print {
      body { background: #fff; padding: 24px; }
      .sb-sheet { box-shadow: none; border: none; padding: 0; }
    }

    @media (max-width: 1100px) {
      .sb-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <div class="sb-sheet">

    <header class="sb-header">
      <p class="sb-eyebrow">City Echo · Scenario 2</p>
      <h1>Storyboard</h1>
      <p class="sb-subtitle">
        Burwood → Wynyard Commute — <span class="accent">"A Stranger's Recommendation"</span> · Qing Xu
      </p>
    </header>

    <section class="sb-grid">

      <figure class="sb-frame">
        <img src="Scene2 Frame 1 - End of a long day.jpg" alt="Scene 1: Qing stands on Burwood Station platform at blue hour, earbuds in, nothing playing yet.">
        <figcaption>
          <h3>Scene 1: End of a long day</h3>
          <p>Another day where she's been surrounded by people and spoken to almost none of them. The ride home is the part of the day she can have to herself.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Scene2 Frame 2 - The train line is listening.png" alt="Scene 2: Qing in an upper-deck window seat as her phone lights up with an Explore prompt.">
        <figcaption>
          <h3>Scene 2: The train line is listening</h3>
          <p>The entire line between Burwood and Wynyard has a listening pattern. Tonight, for the first time, she wants to see it.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Scene2 Frame 3 - The music map.png" alt="Scene 3: Over-the-shoulder view of the Explore music map with amber song pins along the T2/T3/T9 line.">
        <figcaption>
          <h3>Scene 3: The music map of the T2/T3/T9 line</h3>
          <p>The map shows a city that isn't organised by shops or streets — it's organised by what people have felt here, song by song.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Scene2 Frame 4 - A stranger's story.png" alt="Scene 4: Close-up of the expanded song card with an anonymous fox avatar and an attached window-seat photo.">
        <figcaption>
          <h3>Scene 4: A stranger's story, pinned to her line</h3>
          <p>Someone else has sat in her seat, looked through her window, and left a line behind. The song starts — and the carriage changes character around her.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Scene2 Frame 5 - Recognition.jpg" alt="Scene 5: Qing in profile against the train window as tunnel lights streak past.">
        <figcaption>
          <h3>Scene 5: Recognition</h3>
          <p>She didn't share his first semester. But she shares the shape of it — the end of a long day in a language that isn't hers, moving through a tunnel, music doing what no one around her could.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Scene2 Frame 6 - Leave her own trace.png" alt="Scene 6: Top-down view of Qing composing her own post on her lap, the just-taken photo visible.">
        <figcaption>
          <h3>Scene 6: Leave her own trace</h3>
          <p>Three inputs. One photo, one phrase, one mood. She is not performing for anyone — she is leaving a small honest thing where she found one.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Scene2 Frame 7 - Same festival.jpg" alt="Scene 7: Qing's face lit warmly by her phone as she taps send on a friend request.">
        <figcaption>
          <h3>Scene 7: She's going to the same festival</h3>
          <p>"No one to go with" is the reason she's missed six events she wanted to attend this year. Tonight, for the first time, she does the thing that scares her — through a song, not a bio.</p>
        </figcaption>
      </figure>

      <figure class="sb-frame">
        <img src="Scene2 Frame 8 - Wynyard carrying something back.png" alt="Scene 8: Wide shot of Qing stepping off the train into the warm-lit Wynyard concourse.">
        <figcaption>
          <h3>Scene 8: Wynyard, carrying something back</h3>
          <p>She didn't speak a word to a stranger. And yet the line between Burwood and Wynyard now holds a piece of her — and she carries a piece of someone else's home song back into the city with her.</p>
        </figcaption>
      </figure>

    </section>

  </div>

</body>
</html>
